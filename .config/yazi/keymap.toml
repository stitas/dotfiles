[mgr]
prepend_keymap = [
  { on = "n",        	run = "create",                 desc = "Create a new file — `n`" },
  { on = "<S-n>",    	run = "create --dir",           desc = "Create a new folder — `Shift+n`" },
  { on = "d",        	run = "remove --permanently",   desc = "Delete file permanently — `d`" },
  { on = "<S-d>",    	run = "remove",                 desc = "Move file to trash — `Shift+d`" },
  { on = ">",        	run = "find_arrow",             desc = "Find next occurrence after search — `>`" },
  { on = "<",        	run = "find_arrow --previous",  desc = "Find previous occurrence after search — `<`" },
  { on = "a",        	run = "visual_mode",            desc = "Enter select mode — `a`" },
  { on = "<S-a>",    	run = "visual_mode --unset",    desc = "Exit select mode — `Shift+a`" },
  { on = "c",        	run = "yank",                   desc = "Copy file — `c`" },
  { on = "<S-x>",    	run = "unyank",                 desc = "Clear yank — `Shift+x`" },
  { on = "<S-c>",    	run = "unyank",                 desc = "Clear yank — `Shift+c`" },
  { on = "v",        	run = "paste",                  desc = "Paste file — `v`" },
  { on = "<S-v>",    	run = "paste --force",          desc = "Paste file and overwrite — `Shift+v`" },
  { on = "u",    		run = "undo",          			desc = "Undo — `u`" },
  { on = [ "y", "c" ], 	run = "copy path",            	desc = "Copy the file path — `y c`" },
  { on = [ "y", "d" ], 	run = "copy dirname",         	desc = "Copy the directory path — `y d`" },
  { on = [ "y", "f" ], 	run = "copy filename",        	desc = "Copy the filename — `y f`" },
  { on = [ "y", "n" ], 	run = "copy name_without_ext", 	desc = "Copy filename without extension — `y n`" },
  { on = "N",        	run = "noop" },
]

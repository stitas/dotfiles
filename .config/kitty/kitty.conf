font_size 20.0
confirm_os_window_close 0

# BEGIN_KITTY_FONTS
font_family      family="FiraMono Nerd Font Mono"
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS

# KEY BINDINGS
# remove these to make micro work
map ctrl+shift+up
map ctrl+shift+down
map ctrl+shift+left
map ctrl+shift+right

# instead of ctrl+shift+up/down
map alt+up scroll_line_up
map alt+down scroll_line_down
